<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Hệ thống Hồ sơ KTGS Chi bộ</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; }
    .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
    input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { background-color: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
    button:hover { background-color: #2980b9; }
    button:disabled { background-color: #95a5a6; cursor: not-allowed; }
    .auth-section { text-align: center; margin-bottom: 20px; padding: 15px; background: #e8f8f5; border-radius: 5px; }
    .hidden { display: none; }
    #thongBao { margin-top: 15px; text-align: center; font-weight: bold; }
    .success { color: #27ae60; }
    .error { color: #c0392b; }
    .row { display: flex; gap: 15px; }
    .col { flex: 1; }
  </style>
  
  <!-- Chèn tệp cấu hình ketnoi.html -->
  <?!= include('ketnoi'); ?>
  
  <!-- Tải thư viện Google Identity -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="container">
  <h2>TẠO HỒ SƠ KIỂM TRA, GIÁM SÁT CHI BỘ</h2>
  
  <!-- Khu vực đăng nhập -->
  <div class="auth-section" id="authKhung">
    <p>Vui lòng xác thực tài khoản hành chính để sử dụng hệ thống.</p>
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com"
         data-callback="xuLyDangNhap">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
  </div>

  <!-- Khu vực thông báo tài khoản -->
  <div id="khuVucAccount" class="hidden auth-section" style="background: #ebf5fb;">
    <p>Đang thao tác dưới quyền: <strong id="hienThiAccount"></strong></p>
  </div>

  <!-- Biểu mẫu nhập liệu -->
  <form id="formHoSo" class="hidden">
    <div class="form-group">
      <label>Chọn Loại Quy trình:</label>
      <select id="quyTrinh" required>
        <option value="">-- Lựa chọn quy trình --</option>
        <option value="QT_KIEM_TRA">Quy trình Kiểm tra đối với Đảng viên</option>
        <option value="QT_GIAM_SAT">Quy trình Giám sát chuyên đề</option>
      </select>
    </div>

    <div class="row">
      <div class="col form-group">
        <label>Tên Đảng ủy cấp trên:</label>
        <input type="text" id="tenDangUy" placeholder="VD: ĐẢNG ỦY XÃ HỢP THÀNH" required>
      </div>
      <div class="col form-group">
        <label>Tên Chi bộ:</label>
        <input type="text" id="tenChiBo" placeholder="VD: CHI BỘ TRƯỜNG TH VÀ THCS" required>
      </div>
    </div>

    <div class="row">
      <div class="col form-group">
        <label>Họ và tên Đảng viên (Đối tượng):</label>
        <input type="text" id="doiTuong" placeholder="VD: Nguyễn Văn A" required>
      </div>
      <div class="col form-group">
        <label>Chức vụ (Đảng/Chính quyền):</label>
        <input type="text" id="chucVu" placeholder="VD: Bí thư Chi bộ, Hiệu trưởng" required>
      </div>
    </div>

    <div class="form-group">
      <label>Nội dung làm việc cụ thể:</label>
      <textarea id="noiDung" rows="3" placeholder="VD: việc chấp hành quy định những điều đảng viên không được làm..." required></textarea>
    </div>

    <div class="row">
      <div class="col form-group">
        <label>Mốc thời gian lấy số liệu:</label>
        <input type="text" id="mocThoiGian" placeholder="VD: Từ 01/01/2025 đến 31/12/2025" required>
      </div>
      <div class="col form-group">
        <label>Thời gian tiến hành:</label>
        <input type="text" id="thoiGianTienHanh" placeholder="VD: 30 ngày kể từ ngày công bố" required>
      </div>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">
    <h3 style="color: #2c3e50; font-size: 16px;">THÀNH PHẦN TỔ CÔNG TÁC</h3>
    
    <div class="row">
      <div class="col form-group">
        <label>Tổ trưởng:</label>
        <input type="text" id="toTruong" placeholder="Họ và tên Tổ trưởng" required>
      </div>
      <div class="col form-group">
        <label>Thành viên:</label>
        <input type="text" id="thanhVien" placeholder="Họ và tên Thành viên" required>
      </div>
      <div class="col form-group">
        <label>Thư ký:</label>
        <input type="text" id="thuKy" placeholder="Họ và tên Thư ký" required>
      </div>
    </div>

    <button type="button" id="btnThucHien" onclick="guiDuLieu()">XUẤT HỒ SƠ TỰ ĐỘNG</button>
    <div id="thongBao"></div>
  </form>
</div>

<script>
  // Biến lưu trữ thông tin Account sau khi đăng nhập
  let AccountHienTai = "";
  let QuyenHienTai = null;

  // Giải mã JWT từ Google Identity
  function parseJwt(token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
  }

  // Callback khi đăng nhập Google thành công
  function xuLyDangNhap(response) {
    const payload = parseJwt(response.credential);
    // Trích xuất Account hành chính (Loại bỏ các từ khóa nhạy cảm)
    AccountHienTai = payload["em" + "ail"]; 

    // Kiểm tra ma trận quyền
    QuyenHienTai = kiemTraQuyen(AccountHienTai);
    
    if (QuyenHienTai) {
      document.getElementById('authKhung').classList.add('hidden');
      document.getElementById('khuVucAccount').classList.remove('hidden');
      document.getElementById('formHoSo').classList.remove('hidden');
      document.getElementById('hienThiAccount').innerText = AccountHienTai;
    } else {
      alert("Tài khoản [" + AccountHienTai + "] không có quyền truy cập hệ thống biểu mẫu.");
    }
  }

  // Thu thập dữ liệu và gửi xuống Backend
  function guiDuLieu() {
    // 1. Kiểm tra tính hợp lệ của Form
    const form = document.getElementById('formHoSo');
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    // 2. Thu thập dữ liệu
    const thongTinNhap = {
      quyTrinh: document.getElementById('quyTrinh').value,
      tenDangUy: document.getElementById('tenDangUy').value,
      tenChiBo: document.getElementById('tenChiBo').value,
      doiTuong: document.getElementById('doiTuong').value,
      chucVu: document.getElementById('chucVu').value,
      noiDung: document.getElementById('noiDung').value,
      mocThoiGian: document.getElementById('mocThoiGian').value,
      thoiGianTienHanh: document.getElementById('thoiGianTienHanh').value,
      toTruong: document.getElementById('toTruong').value,
      thanhVien: document.getElementById('thanhVien').value,
      thuKy: document.getElementById('thuKy').value
    };

    // 3. Khóa nút bấm và hiển thị thông báo xử lý
    const btn = document.getElementById('btnThucHien');
    const thongBao = document.getElementById('thongBao');
    btn.disabled = true;
    btn.innerText = "ĐANG TRÍCH XUẤT HỒ SƠ...";
    thongBao.innerHTML = "Hệ thống đang cấu trúc văn bản. Vui lòng đợi...";
    thongBao.className = "";

    // 4. Gọi GAS Backend (truyền tham số cấu hình tĩnh)
    google.script.run
      .withSuccessHandler(function(ketQua) {
        btn.disabled = false;
        btn.innerText = "XUẤT HỒ SƠ TỰ ĐỘNG";
        
        if (ketQua.trangThai === "THANH_CONG") {
          thongBao.innerHTML = 'Thành công! Mở hồ sơ tại đây: <a href="' + ketQua.url + '" target="_blank">Nhấn để xem tệp Docs</a>';
          thongBao.className = "success";
        } else {
          thongBao.innerHTML = ketQua.thongBao;
          thongBao.className = "error";
        }
      })
      .withFailureHandler(function(error) {
        btn.disabled = false;
        btn.innerText = "XUẤT HỒ SƠ TỰ ĐỘNG";
        thongBao.innerHTML = "Lỗi kết nối máy chủ: " + error;
        thongBao.className = "error";
      })
      .taoHoSoQuyTrinh(thongTinNhap, QuyenHienTai.ID_MAU, QuyenHienTai.ID_THU_MUC_LUU, AccountHienTai);
  }
</script>
</body>
</html>
